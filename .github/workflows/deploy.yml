name: Deploy to S3

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::736461511133:role/github-actions-deploy-role
          aws-region: us-east-1

      - name: Sync files to S3
        run: aws s3 sync . s3://my-aws-pro-static-website-hosting --delete --exclude ".git/*" --exclude ".github/*"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E9XVPXUZEEDFD --paths "/*"
